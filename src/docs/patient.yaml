components:
  schemas:
    Patient:
      type: object
      required:
        - resourceType
        - id
        - active
        - name
        - gender
        - birthDate
      properties:
        resourceType:
          type: string
          enum: [Patient]
          example: Patient
        id:
          type: string
          description: The unique identifier for the patient.
          example: "60c72b2f9b1e8b001c8e4d2a"
        active:
          type: boolean
          description: Whether the patient record is active.
          example: true
        name:
          type: array
          description: A list of names associated with the patient.
          items:
            $ref: '#/components/schemas/HumanName'
        telecom:
          type: array
          description: Contact details for the patient.
          items:
            $ref: '#/components/schemas/ContactPoint'
        gender:
          $ref: '#/components/schemas/Gender'
        birthDate:
          type: string
          format: date
          description: The patient's date of birth.
          example: "1990-01-15"
        deceased:
          oneOf:
            - type: boolean
            - type: string
              format: date
          description: Indicates if the patient is deceased, and optionally when.
          example: false
        address:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        maritalStatus:
          $ref: '#/components/schemas/CodeableConcept'
        multipleBirth:
          oneOf:
            - type: boolean
            - type: number
          description: Indicates if the patient was part of a multiple birth.
          example: 2
        photo:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        contact:
          type: array
          items:
            $ref: '#/components/schemas/PatientContact'
        communication:
          type: array
          items:
            $ref: '#/components/schemas/Communication'
        generalPractitioner:
          type: array
          items:
            type: string
        managingOrganization:
          type: string
        link:
          type: array
          items:
            $ref: '#/components/schemas/PatientLink'
    
    CodeableConcept:
      type: object
      properties:
        coding:
          type: array
          items:
            $ref: '#/components/schemas/Coding'
        text:
          type: string
    
    Coding:
      type: object
      properties:
        system:
          type: string
        version:
          type: string
        code:
          type: string
        display:
          type: string
        userSelected:
          type: boolean
    
    PatientContact:
      type: object
      required:
        - gender
      properties:
        relationship:
          type: array
          items:
            $ref: '#/components/schemas/CodeableConcept'
        name:
          $ref: '#/components/schemas/HumanName'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/ContactPoint'
        address:
          $ref: '#/components/schemas/Address'
        gender:
          $ref: '#/components/schemas/Gender'
        organization:
          type: string
        period:
          $ref: '#/components/schemas/Period'
    
    PatientLink:
      type: object
      required:
        - other
        - type
      properties:
        other:
          type: string
        type:
          type: string
          enum: [replaced-by, replaces, refer, seealso]
    
    HumanName:
      type: object
      properties:
        use:
          type: string
          enum: [usual, official, temp, nickname, anonymous, old, maiden]
        text:
          type: string
        family:
          type: string
        given:
          type: array
          items:
            type: string
        prefix:
          type: array
          items:
            type: string
        suffix:
          type: array
          items:
            type: string
        period:
          $ref: '#/components/schemas/Period'
    
    ContactPoint:
      type: object
      properties:
        system:
          type: string
          enum: [phone, fax, email, pager, url, sms, other]
        value:
          type: string
        use:
          type: string
          enum: [home, work, temp, old, mobile]
        rank:
          type: integer
        period:
          $ref: '#/components/schemas/Period'
    
    Address:
      type: object
      properties:
        use:
          type: string
          enum: [home, work, temp, old, billing]
        type:
          type: string
          enum: [postal, physical, both]
        text:
          type: string
        line:
          type: array
          items:
            type: string
        city:
          type: string
        district:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
        period:
          $ref: '#/components/schemas/Period'
    
    Gender:
      type: string
      enum: [male, female, other, unknown]
    
    Period:
      type: object
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
    
    Attachment:
      type: object
      properties:
        contentType:
          type: string
        language:
          type: string
        data:
          type: string
          format: byte
        url:
          type: string
          format: url
        size:
          type: integer
        hash:
          type: string
          format: byte
        title:
          type: string
        creation:
          type: string
          format: date-time
    
    Communication:
      type: object
      properties:
        language:
          $ref: '#/components/schemas/CodeableConcept'
        preferred:
          type: boolean

paths:
  /patients:
    get:
      summary: List all patients
      responses:
        '200':
          description: A list of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
    post:
      summary: Create a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'
      responses:
        '201':
          description: Created
  /patients/{id}:
    get:
      summary: Get patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Patient'
      responses:
        '200':
          description: OK
    delete:
      summary: Delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted